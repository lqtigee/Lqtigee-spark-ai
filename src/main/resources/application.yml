server:
  port: 20261

spring:
  application:
    name: Lqtigee-spark-ai

lqtigee:
  security:
    api-token: ${LQTIGEE_API_TOKEN:}
  database:
    enabled: false
    url: jdbc:postgresql://localhost:5432/lqtigee_spark_ai
    username: lqtigee
    password: ${LQTIGEE_DB_PASSWORD:}
  remote:
    max-prompt-chars: 8000
    attachment-root: /home/lqtiger/.lqtigee-spark-ai/attachments
    max-upload-bytes: 10485760
    allowed-content-types:
      - image/png
      - image/jpeg
      - image/webp
      - text/plain
      - application/json
  models:
    entries:
      - id: gpt-5.5
        label: GPT-5.5
        commandModelName: gpt-5.5
        sources:
          - CODEX
        enabled: true
      - id: openai/Lqtigee
        label: Lqtigee
        commandModelName: openai/Lqtigee
        sources:
          - OPENCODE
        enabled: true
