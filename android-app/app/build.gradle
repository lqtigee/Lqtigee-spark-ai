plugins {
    id "com.android.application"
}

android {
    namespace "com.lqtigee.sparkai"
    compileSdk 36

    defaultConfig {
        applicationId "com.lqtigee.sparkai"
        minSdk 26
        targetSdk 35
        versionCode 12
        versionName "0.2.3"
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    signingConfigs {
        debugStable {
            storeFile file("../keystore/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debugStable
        }
        release {
            signingConfig signingConfigs.debugStable
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    implementation "org.mozilla.geckoview:geckoview-arm64-v8a:152.0.20260621191700"
}
